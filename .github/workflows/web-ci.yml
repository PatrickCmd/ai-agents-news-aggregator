name: web-ci

on:
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  push:
    branches: [main]
    paths:
      - "web/**"

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_API_URL: http://example-build-time.invalid
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy_for_build
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install (no postinstall scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: OSV-Scanner
        run: |
          curl -fsSL -o /tmp/osv-scanner \
            https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64
          chmod +x /tmp/osv-scanner
          # OSV-Scanner v2 removed `--fail-on-vuln`; exiting non-zero on findings is now the default.
          /tmp/osv-scanner scan source --recursive .
      - name: Build (verifies static export compiles)
        run: pnpm build
