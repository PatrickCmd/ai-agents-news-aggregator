[mypy]
python_version = 3.12
strict = True
warn_unused_ignores = True
namespace_packages = True
explicit_package_bases = True
mypy_path = packages/schemas/src:packages/config/src:packages/observability/src:packages/db/src:services/scraper/src:services/agents/digest/src:services/agents/editor/src:services/agents/email/src:services/scheduler/src
exclude = (?x)(
    /tests/
    | ^tests/
    | /alembic/versions/
  )

[mypy-testcontainers.*]
ignore_missing_imports = True

[mypy-feedparser.*]
ignore_missing_imports = True

[mypy-youtube_transcript_api.*]
ignore_missing_imports = True

[mypy-loguru.*]
ignore_missing_imports = True

[mypy-langfuse.*]
ignore_missing_imports = True

[mypy-tenacity.*]
ignore_missing_imports = True

[mypy-alembic.*]
ignore_missing_imports = True

[mypy-agents.*]
ignore_missing_imports = True

[mypy-typer.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-dateutil.*]
ignore_missing_imports = True

[mypy-boto3.*]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True
