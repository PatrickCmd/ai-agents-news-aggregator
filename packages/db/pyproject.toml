[project]
name = "news_db"
version = "0.1.0"
requires-python = ">=3.12"
description = "SQLAlchemy models, Alembic migrations, repositories"
dependencies = [
    "sqlalchemy[asyncio]>=2.0.36",
    "asyncpg>=0.30",
    "alembic>=1.13",
    "pydantic>=2.13.3",
    "news_schemas",
    "news_config",
    "news_observability",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/news_db"]
