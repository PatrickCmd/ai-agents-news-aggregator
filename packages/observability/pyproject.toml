[project]
name = "news_observability"
version = "0.1.0"
requires-python = ">=3.12"
description = "Logging, tracing, audit, retry, sanitizer, limits"
dependencies = [
    "loguru>=0.7.3",
    "tenacity>=9.0",
    "pydantic>=2.13",
    "news_schemas",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/news_observability"]
