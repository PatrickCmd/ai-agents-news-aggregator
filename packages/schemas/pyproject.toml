[project]
name = "news_schemas"
version = "0.1.0"
requires-python = ">=3.12"
description = "Cross-package Pydantic contracts"
dependencies = [
    "pydantic>=2.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/news_schemas"]
